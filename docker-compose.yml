# Production Docker Compose
# For development, run services locally:
#   pnpm db:up       # PostgreSQL
#   pnpm server:dev  # Backend
#   pnpm web:dev     # Frontend
# For production: docker compose up

services:
  postgres:
    image: postgres:17-alpine
    container_name: mindflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mindflow}
      POSTGRES_DB: mindflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: mindflow-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://mindflow:mindflow@postgres:5432/mindflow}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-must-be-at-least-32-characters-long}
      PORT: "3000"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL_DOCKER:-}
    container_name: mindflow-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres-data:
